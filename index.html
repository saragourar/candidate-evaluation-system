<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>شبكة التقييم</title>

    <style>
        body {
            font-family: Arial;
            direction: rtl;
            background-color: #f5f7fa;
            padding: 40px;
        }

        h2 {
            color: #0d6efd;
        }

        .section {
            background: white;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .row {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
            width: 200px;
            padding: 6px;
        }

        .points {
            color: red;
            font-weight: bold;
            margin-right: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .result {
            font-size: 20px;
            color: green;
            margin-top: 20px;
        }

    </style>
</head>
<body>

<form method="POST">

    <div class="section">
        <h2>📚 الأعمال العلمية</h2>

        <div class="row">
            <label>مقال صنف أ+ <span class="points">(5 نقاط)</span></label>
            <input type="number" name="a1" step="0.25" min="0" max="5">
        </div>

        <div class="row">
            <label>مقال صنف أ <span class="points">(4 نقاط)</span></label>
            <input type="number" name="a2" step="0.25" min="0" max="4">
        </div>

        <div class="row">
            <label>مقال صنف ب <span class="points">(3 نقاط)</span></label>
            <input type="number" name="a3" step="0.25" min="0" max="3">
        </div>

        <div class="row">
            <label>مقال إضافي <span class="points">(1 نقطة)</span></label>
            <input type="number" name="a4" step="0.25" min="0" max="1">
        </div>

        <div class="row">
            <label>كتاب علمي <span class="points">(1.5 نقطة)</span></label>
            <input type="number" name="book" step="0.25" min="0" max="1.5">
        </div>

        <div class="row">
            <label>مداخلة دولية <span class="points">(2 نقاط)</span></label>
            <input type="number" name="international" step="0.25" min="0" max="2">
        </div>

        <div class="row">
            <label>مداخلة وطنية <span class="points">(1 نقطة)</span></label>
            <input type="number" name="national" step="0.25" min="0" max="1">
        </div>
    </div>
    <div class="section">
    <h2>💼 الخبرة المهنية</h2>

    <div class="row">
        <label>التدريس في نفس القطاع <span class="points">(3 نقاط)</span></label>
        <input type="number" name="same_field" step="0.25" min="0" max="3">
    </div>

    <div class="row">
        <label>التدريس خارج القطاع <span class="points">(1.5 نقطة)</span></label>
        <input type="number" name="outside_field" step="0.25" min="0" max="1.5">
    </div>

    <div class="row">
        <label>مجال آخر <span class="points">(1.5 نقطة)</span></label>
        <input type="number" name="other_field" step="0.25" min="0" max="1.5">
    </div>
</div>
<div class="section">
    <h2>🎤 المقابلة</h2>

    <div class="row">
        <label>القدرة على التحليل والتلخيص <span class="points">(1 نقطة)</span></label>
        <input type="number" name="analysis" step="0.25" min="0" max="1">
    </div>

    <div class="row">
        <label>وضوح وسلاسة الخطاب <span class="points">(1 نقطة)</span></label>
        <input type="number" name="clarity" step="0.25" min="0" max="1">
    </div>

    <div class="row">
        <label>القدرة على التواصل <span class="points">(1 نقطة)</span></label>
        <input type="number" name="communication" step="0.25" min="0" max="1">
    </div>

    <div class="row">
        <label>المهارات العلمية الخاصة <span class="points">(1 نقطة)</span></label>
        <input type="number" name="skills" step="0.25" min="0" max="1">
    </div>
</div>


    <button type="submit">حساب المجموع</button>

    {% if total is not none %}
        <div class="result">
            ✅ المجموع النهائي: {{ total }}
        </div>
    {% endif %}

</form>

</body>
</html>
